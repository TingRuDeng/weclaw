name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v0.1.42'
        required: true

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ inputs.tag }}

concurrency:
  group: stable-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Test
        run: go test ./... -count=1 -timeout 120s

      - name: Race test
        run: go test -race ./... -count=1 -timeout 180s

      - name: Vet
        run: go vet ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w -X github.com/fastclaw-ai/weclaw/cmd.Version=${RELEASE_TAG}" \
            -o weclaw_${{ matrix.goos }}_${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: weclaw_${{ matrix.goos }}_${{ matrix.goarch }}
          path: weclaw_${{ matrix.goos }}_${{ matrix.goarch }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum weclaw_* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/weclaw_*
            dist/checksums.txt
