name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v0.1.42'
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag }}

concurrency:
  group: stable-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # release.sh 的发布门禁要求 clean main 且 HEAD 与 origin/main 一致；
      # 因此不能 checkout 尚未由脚本创建的 tag。
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Run canonical release pipeline
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/release.sh "$RELEASE_TAG"
