name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Build
        run: go build ./...

      - name: Module tidy check
        run: go mod tidy -diff

      - name: Test
        run: go test ./... -count=1 -race -v

      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Determine version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ "$REF_NAME" = "main" ]; then
            echo "version=v0.0.0-beta+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v0.0.0-alpha+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w -X github.com/fastclaw-ai/weclaw/cmd.Version=${{ steps.version.outputs.version }}" \
            -o weclaw_${{ matrix.goos }}_${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: weclaw_${{ matrix.goos }}_${{ matrix.goarch }}
          path: weclaw_${{ matrix.goos }}_${{ matrix.goarch }}*

  publish:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: prerelease-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum weclaw_* > checksums.txt

      - name: Determine release tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(printf '%s' "$COMMIT_SHA" | cut -c1-7)
          if [ "$REF_NAME" = "main" ]; then
            echo "tag=beta-latest" >> "$GITHUB_OUTPUT"
            echo "name=Beta (main @ ${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          else
            SAFE_BRANCH=$(printf '%s' "$REF_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "tag=alpha-${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
            echo "name=Alpha (${SAFE_BRANCH} @ ${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release delete "$RELEASE_TAG" --repo "${{ github.repository }}" --cleanup-tag --yes 2>/dev/null || true
          gh api --method DELETE "repos/${{ github.repository }}/git/refs/tags/${RELEASE_TAG}" 2>/dev/null || true

      - name: Create pre-release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: |
            dist/weclaw_*
            dist/checksums.txt
          body: |
            Pre-release build from `${{ github.ref_name }}` branch.
            Commit: ${{ github.sha }}
