<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WeClaw 配置面板</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f5f6f8; color: #1f2329; }
    header { background: #1f6feb; color: #fff; padding: 14px 20px; font-size: 18px; }
    main { max-width: 880px; margin: 0 auto; padding: 20px; }
    .card { background: #fff; border-radius: 10px; padding: 16px 18px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card h2 { margin: 0 0 12px; font-size: 15px; }
    label { display: block; font-size: 13px; color: #555; margin: 8px 0 4px; }
    input[type=text], input[type=number], textarea { width: 100%; box-sizing: border-box; padding: 7px 9px; border: 1px solid #d0d3d9; border-radius: 6px; font-size: 13px; }
    button { background: #1f6feb; color: #fff; border: 0; border-radius: 6px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
    button.secondary { background: #e8eaed; color: #1f2329; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row > div { flex: 1; min-width: 200px; }
    .muted { color: #8a9099; font-size: 12px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    .ok { background: #e6f4ea; color: #1a7f37; }
    .warn { background: #fff3e0; color: #b26a00; }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2329; color: #fff; padding: 10px 16px; border-radius: 8px; display: none; }
    #qr { margin-top: 10px; }
    img.qr { width: 200px; height: 200px; image-rendering: pixelated; border: 1px solid #eee; }
  </style>
</head>
<body>
  <header>WeClaw 配置面板</header>
  <main>
    <div class="card" id="status-card"><h2>状态</h2><div id="status">加载中…</div></div>

    <div class="card"><h2>安全</h2>
      <label>允许的工作目录根 (allowed_workspace_roots，每行一个)</label>
      <textarea id="workspace-roots" rows="3"></textarea>
      <div class="row">
        <div><label>每分钟限流 (rate_limit_per_minute，0=不限)</label><input type="number" id="rate-limit" min="0" /></div>
      </div>
      <p class="muted">未配置工作目录根时，/cwd 可指向任意目录，建议限制。</p>
    </div>

    <div class="card"><h2>飞书</h2>
      <div class="row">
        <div><label>App ID</label><input type="text" id="fs-appid" placeholder="cli_xxx" /></div>
        <div><label>App Secret</label><input type="text" id="fs-secret" placeholder="只写不回显" /></div>
      </div>
      <div style="margin-top:10px"><button onclick="saveFeishu()">保存凭证</button>
        <button class="secondary" onclick="validateFeishu()">校验有效性</button></div>
    </div>

    <div class="card"><h2>微信</h2>
      <button onclick="startWeChatLogin()">扫码添加账号</button>
      <div id="qr"></div>
    </div>

    <div style="text-align:right"><button onclick="saveConfig()">保存配置</button></div>
  </main>
  <div id="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
